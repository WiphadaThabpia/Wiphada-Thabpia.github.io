function putPixel(x, y, r, g, b, a=255) {
    const index = (y * canvas.width + x) * 4;
    data[index] = r;     // Red
    data[index + 1] = g; // Green
    data[index + 2] = b; // Blue
    data[index + 3] = a; // Alpha
}
function drawLine(x1, y1, x2, y2, r, g, b, a = 255) {
  const dx = Math.abs(x2 - x1);
  const dy = Math.abs(y2 - y1);

  if(dx > dy) {
    const m = (y2 - y1) / (x2 - x1);
    const c = y1 - m * x1;
    for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
      const y = Math.round(m * x + c);
      putPixel(x, y, r, g, b, a);
    }
  } else {
    const m = (x2 - x1) / (y2 - y1);
    const c = x1 - m * y1;
    for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
      const x = Math.round(m * y + c);
      putPixel(x, y, r, g, b, a);
    }
  }
}
function drawRect(x1,y1,x2,y2,r,g,b,a = 255){
    drawLine(x1,y1,x2,y1,r,g,b,a); // Top edge
    drawLine(x2,y1,x2,y2,r,g,b,a); // Right edge
    drawLine(x2,y2,x1,y2,r,g,b,a); // Bottom edge
    drawLine(x1,y2,x1,y1,r,g,b,a); // Left edge
}

    for(let y = y1; y <= y2; y++){

    }
}

function drawRectGradient(x1,y1,x2,y2, r1,g1,b1, r2,g2,b2, a = 255){
    for(let y = y1; y <= y2; y++){
        let t = (y - y1) / (y2 - y1);
        let r = Math.round(r1 * (1 - t) + r2 * t);
        let g = Math.round(g1 * (1 - t) + g2 * t);
        let b = Math.round(b1 * (1 - t) + b2 * t);
        for(let x = x1; x <= x2; x++){
            putPixel(x,y,r,g,b,a);
        }
    }
}

            }
        }
    }
}

        const rotatedY = Math.round(localX * Math.sin(rad) + localY * Math.cos(rad));
        const scaledX = Math.round(rotatedX * scaleX);
        const scaledY = Math.round(rotatedY * scaleY);
        const px = x + scaledX;
        const py = y + scaledY;

        const r = (color >> 16) & 255;
        const g = (color >> 16) & 255;
        const b = color & 255;
        drawEllipse(px, py, Math.round(scaleX), Math.round(scaleY), r, g, b);
      }
    }
  }
}

function drawSpriteRotateScale(sprite, x, y, degree, scaleX, scaleY, r, g, b, a = 255) {
  for (let j = 0; j < sprite.length; j++) {
    for (let i = 0; i < sprite[j].length; i++) {
      if (sprite[j][i] === 1) {
        const cX = i - (sprite[j].length / 2);
        const cY = j - (sprite.length / 2);

        //Rotate
        const rad = degree * (Math.PI / 180);
        const x_rot = Math.round(cX * Math.cos(rad) - cY * Math.sin(rad));
        const y_rot = Math.round(cX * Math.sin(rad) + cY * Math.cos(rad));
        //Scale
        const x_scaled= Math.round(x_rot * scaleX);
        const y_scaled = Math.round(y_rot * scaleX);
        //Translate
        const x_translated = Math.round(x_scaled + x); 
        const y_translated = Math.round(y_scaled + y);

        //putPixel(x_scaled + x, y_scaled + y, r, g, b, a);
        drawEllipse(x_scaled + x, y_scaled + y,Math.round(scaleX), Math.round(scaleY), r, g, b, a);
      }
    }
  }
}


function toScaledMouseCoords(clientX, clientY) {//พื้นที่ทำงาน
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
        x: Math.floor((clientX - rect.left) * scaleX),
        y: Math.floor((clientY - rect.top) * scaleY)
    };
}

canvas.addEventListener('click',function(event){
    const{x,y} = toScaledMouseCoords(event.clientX, event.clientY);
    console.log('clicked', x, y);
    putPixel(x, y,255, 0, 0);
    ctx.putImageData(imageData, 0, 0);
});

canvas.addEventListener('mousedown',function(event){
    isDragging = true;

    const{x,y} = toScaledMouseCoords(event.clientX, event.clientY);
    putPixel(x, y, 0, 255, 0);
    ctx.putImageData(imageData, 0, 0);
});

canvas.addEventListener('mouseup',function(event){
    isDragging = false;
    const{x,y} = toScaledMouseCoords(event.clientX, event.clientY);
    putPixel(x, y, 0, 0, 255);
    ctx.putImageData(imageData, 0, 0);
});

canvas.addEventListener('mousemove',function(event){
    const{x,y} = toScaledMouseCoords(event.clientX, event.clientY);
    mouseX = x;
    mouseY = y;
    if(isDragging){
        drawLine(previousMouseX,previousMouseY , x, y, r, g, b);//เราลากเส้นจากจุดที่แล้วมาจุดล่าสุด
        //putPixel(x, y, 255, 120, 0);
    }
    ctx.putImageData(imageData, 0, 0);

    previousMouseX = x;//เอาจุดใหม่ไปเก็บแทนจุดเก่า
    previousMouseY = y;//เอาจุดใหม่ไปเก็บแทนจุดเก่า
});

window.addEventListener('keydown',function(event){
    console.log('keydown',event.key);
    if(event.key == '1'){
        r = 255;g = 0; b = 0;
    }else if(event.key == '2'){
        r = 0;g = 255; b = 0;
    }else if(event.key == '3'){
        r = 0;g = 0; b = 255;
    }else if(event.key == 'e'){
        r = 255;g = 255; b = 255;
    }

    if(event.key === 'ArrowLeft') {
        degree -= 5;
    }
    else if(event.key === 'ArrowRight') {
        degree += 5;
    }

    if (event.key === 'ArrowUp') {
        scale += 0.1;
    }
    else if (event.key === 'ArrowDown') {
        scale -= 0.1;
    }
});

window.addEventListener('keyup',function(event){
    console.log('keyup',event.key);
});

  ctx.putImageData(imageData, 0, 0);

}
